<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0c">
<title>Wellbeing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1f1f1f;
    --surface3: #282828;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #eeebe4;
    --text2: #7a7770;
    --text3: #3f3d3a;
    --gold: #c9a96e;
    --gold2: #8a6f45;
    --green: #6a9e72;
    --red: #9e6a6a;
    --blue: #6a7f9e;
    --radius: 14px;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Geist', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; overscroll-behavior: none; }

  /* API Key screen */
  #api-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 32px; z-index: 200; }
  #api-screen.hidden { display: none; }
  .api-box { width: 100%; max-width: 400px; }
  .api-box h2 { font-family: var(--font-display); font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 8px; }
  .api-box h2 em { color: var(--gold); font-style: italic; }
  .api-box p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; font-weight: 300; }
  .api-box a { color: var(--gold); text-decoration: none; }
  .api-input-wrap { position: relative; margin-bottom: 12px; }
  .api-input-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: var(--font-body); outline: none; font-weight: 300; }
  .api-input-wrap input:focus { border-color: var(--gold2); }
  .api-input-wrap input::placeholder { color: var(--text3); }
  .api-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 10px; color: #1a1208; font-size: 14px; font-family: var(--font-body); font-weight: 500; cursor: pointer; }
  .api-note { font-size: 11px; color: var(--text3); margin-top: 12px; line-height: 1.5; text-align: center; }

  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 500px; margin: 0 auto; }

  #header { padding: 24px 20px 10px; flex-shrink: 0; }
  #header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .date-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; font-weight: 400; }
  h1 { font-family: var(--font-display); font-size: 32px; font-weight: 400; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
  h1 em { color: var(--gold); font-style: italic; }
  #daily-summary { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; min-height: 16px; font-weight: 300; }
  #key-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font-body); padding: 4px; margin-top: 4px; }
  #key-btn:hover { color: var(--text2); }

  #tabs { display: flex; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 10px 0; margin-right: 20px; font-size: 12px; font-weight: 400; color: var(--text3); cursor: pointer; border: none; background: none; font-family: var(--font-body); letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1.5px solid transparent; margin-bottom: -1px; transition: all .2s; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #log-panel, #stats-panel { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
  #log-panel { padding: 16px 20px; gap: 10px; }
  #stats-panel { padding: 16px 20px; gap: 14px; }

  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  #messages::-webkit-scrollbar { display: none; }

  .msg { max-width: 84%; animation: rise .22s ease; }
  @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .msg.user { align-self: flex-end; }
  .msg.user .bubble { background: var(--gold2); color: #f5e8d0; border-radius: 18px 18px 4px 18px; padding: 10px 14px; font-size: 14px; line-height: 1.55; font-weight: 300; }

  .msg.assistant { align-self: flex-start; max-width: 92%; }
  .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 18px 18px 18px 4px; padding: 11px 14px; font-size: 14px; line-height: 1.65; font-weight: 300; }
  .msg.thinking .bubble { color: var(--text2); }
  .msg.thinking .bubble::after { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; margin-left: 6px; animation: pulse 1s ease-in-out infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

  .tag { font-size: 11px; color: var(--green); margin-top: 5px; padding-left: 2px; display: flex; align-items: center; gap: 5px; font-weight: 300; }
  .tag.err { color: var(--red); }
  .tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  #chips { display: flex; gap: 7px; padding: 8px 20px 10px; overflow-x: auto; flex-shrink: 0; }
  #chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font-body); transition: all .15s; flex-shrink: 0; font-weight: 300; }
  .chip:active { background: var(--surface2); color: var(--text); }

  #input-row { padding: 8px 16px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; border-top: 1px solid var(--border); }
  #user-input { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 11px 15px; color: var(--text); font-size: 14px; font-family: var(--font-body); resize: none; outline: none; max-height: 110px; line-height: 1.5; font-weight: 300; transition: border-color .2s; }
  #user-input::placeholder { color: var(--text3); }
  #user-input:focus { border-color: var(--gold2); }
  #send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: #1a1208; }

  /* Log */
  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; }
  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .entry-date { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .entry-type { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; letter-spacing: 0.3px; }
  .entry-type.nutrition { background: rgba(106,158,114,0.15); color: var(--green); }
  .entry-type.wellbeing { background: rgba(201,169,110,0.15); color: var(--gold); }
  .entry-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 400; }
  .pill.food { background: rgba(106,158,114,0.12); color: var(--green); border: 1px solid rgba(106,158,114,0.2); }
  .pill.cal { background: rgba(201,169,110,0.12); color: var(--gold); border: 1px solid rgba(201,169,110,0.2); }
  .pill.macro { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .pill.mood { background: rgba(201,169,110,0.12); color: var(--gold); border: 1px solid rgba(201,169,110,0.2); }
  .pill.energy { background: rgba(106,158,114,0.12); color: var(--green); border: 1px solid rgba(106,158,114,0.2); }
  .pill.stress { background: rgba(158,106,106,0.12); color: var(--red); border: 1px solid rgba(158,106,106,0.2); }
  .pill.sleep { background: rgba(106,127,158,0.12); color: var(--blue); border: 1px solid rgba(106,127,158,0.2); }
  .pill.note { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-style: italic; }

  .empty-state { color: var(--text3); font-size: 14px; text-align: center; margin-top: 60px; line-height: 2; font-weight: 300; }
  .empty-state .icon { font-family: var(--font-display); font-size: 36px; font-style: italic; color: var(--gold2); display: block; margin-bottom: 8px; }
  .log-date-header { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 0 6px; }

  /* Stats */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 36px; color: var(--text); line-height: 1; }
  .stat-value span { font-size: 16px; color: var(--text2); font-family: var(--font-body); font-weight: 300; margin-left: 4px; }
  .stat-sub { font-size: 12px; color: var(--text2); margin-top: 6px; font-weight: 300; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .bar-wrap { margin-top: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 300; }
  .bar-track { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--gold); }
  .bar-fill.green { background: var(--green); }
  .bar-fill.blue { background: var(--blue); }

  #status { height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #status-text { font-size: 11px; color: var(--text3); transition: all .3s; }
  #status-text.ok { color: var(--green); }
  #status-text.err { color: var(--red); }
  #status-text.loading { color: var(--gold2); }
</style>
</head>
<body>

<!-- API Key screen -->
<div id="api-screen">
  <div class="api-box">
    <h2>Well<em>being</em></h2>
    <p>Enter your Anthropic API key to get started. It's stored only in your browser and never sent anywhere except directly to Anthropic.<br><br>
    Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys.</p>
    <div class="api-input-wrap">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." onkeydown="if(event.key==='Enter')saveKey()">
    </div>
    <button class="api-btn" onclick="saveKey()">Get started</button>
    <p class="api-note">Your key is saved in localStorage on this device only.</p>
  </div>
</div>

<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div class="date-label" id="today-date"></div>
        <h1>Well<em>being</em></h1>
      </div>
      <button id="key-btn" onclick="clearKey()" title="Change API key">⚙ key</button>
    </div>
    <div id="daily-summary"></div>
  </div>

  <div id="tabs">
    <button class="tab active" onclick="showTab('chat',this)">Chat</button>
    <button class="tab" onclick="showTab('log',this)">Log</button>
    <button class="tab" onclick="showTab('stats',this)">Stats</button>
  </div>

  <div id="status"><span id="status-text"></span></div>

  <div id="chat-panel">
    <div id="messages"></div>
    <div id="chips">
      <button class="chip" onclick="quickSend(this)">I just ate…</button>
      <button class="chip" onclick="quickSend(this)">Macros today?</button>
      <button class="chip" onclick="quickSend(this)">Log my mood</button>
      <button class="chip" onclick="quickSend(this)">Weekly summary</button>
      <button class="chip" onclick="quickSend(this)">Calories so far?</button>
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Tell me what you ate or how you're feeling…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
  </div>

  <div id="log-panel"></div>
  <div id="stats-panel"></div>
</div>

<script>
const WORKER    = "https://dark-waterfall-4198.dcotter05.workers.dev/";
const API_URL   = "https://api.anthropic.com/v1/messages";
const TODAY     = new Date().toISOString().slice(0,10);

let history  = [];
let entries  = { nutrition: [], wellbeing: [] };
let sending  = false;
let API_KEY  = '';

const SYSTEM = `You are a personal wellbeing and nutrition assistant.

NUTRITION: When the user mentions food, use web_search to look up accurate calories and macros (search e.g. "chicken breast 150g calories protein carbs fat"). Then reply briefly confirming what you found. Output one block per food item:
<nutrition>
{"date":"${TODAY}","food":"NAME","quantity":"1","calories":000,"protein_g":00,"carbs_g":00,"fat_g":00,"fibre_g":0,"notes":"any extras like mayo"}
</nutrition>

WELLBEING: When user shares mood/sleep/energy/stress/activity, reply warmly then output:
<wellbeing>
{"date":"${TODAY}","mood":7,"energy":6,"stress":3,"sleep_hrs":7.5,"activity":"30 min walk","note":"felt tired"}
</wellbeing>

INSIGHTS: When asked for summaries or patterns, analyse the database and respond in 2-4 sentences. No blocks needed.

Rules: always search before logging food — never estimate. One <nutrition> block per food item. mood/energy 1-10 (10=best), stress 1-10 (10=worst). Keep replies to 2-3 sentences. Today: ${TODAY}.`;

// --- API key management ---
function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) return alert('Please enter a valid Anthropic API key (starts with sk-)');
  API_KEY = val;
  localStorage.setItem('wb_api_key', val);
  document.getElementById('api-screen').classList.add('hidden');
  init();
}
function clearKey() {
  localStorage.removeItem('wb_api_key');
  API_KEY = '';
  document.getElementById('api-key-input').value = '';
  document.getElementById('api-screen').classList.remove('hidden');
}

// --- UI helpers ---
function setStatus(msg, cls='') {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = cls;
  if (msg && cls === 'ok') setTimeout(() => { el.textContent=''; el.className=''; }, 3000);
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['chat','log','stats'].forEach(id => {
    document.getElementById(id+'-panel').style.display = 'none';
  });
  document.getElementById(tab+'-panel').style.display = 'flex';
  if (tab === 'log') renderLog();
  if (tab === 'stats') renderStats();
}
function quickSend(el) {
  const input = document.getElementById('user-input');
  input.value = el.textContent === 'I just ate…' ? 'I just ate ' : el.textContent;
  input.focus();
  if (el.textContent !== 'I just ate…') sendMessage();
}
function addMsg(role, text, thinking=false) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}${thinking?' thinking':''}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  const msgs = document.getElementById('messages');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return { wrap, bubble };
}

// --- Sheet API via Worker ---
async function sheetPost(data) {
  const res = await fetch(WORKER, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.json();
}
async function loadData() {
  setStatus('Loading…', 'loading');
  try {
    const [n, w] = await Promise.all([
      sheetPost({ action: 'read_nutrition' }),
      sheetPost({ action: 'read_wellbeing' })
    ]);
    entries.nutrition  = n.entries || [];
    entries.wellbeing  = w.entries || [];
    const total = entries.nutrition.length + entries.wellbeing.length;
    setStatus(total ? `✦ ${total} entries loaded` : '', total ? 'ok' : '');
    updateSummary();
  } catch(e) {
    setStatus('Could not reach Google Sheets', 'err');
  }
}
function updateSummary() {
  const todayN = entries.nutrition.filter(e => e.date === TODAY);
  if (!todayN.length) { document.getElementById('daily-summary').textContent = ''; return; }
  const cal  = todayN.reduce((s,e) => s+(parseFloat(e.calories)||0), 0);
  const prot = todayN.reduce((s,e) => s+(parseFloat(e.protein_g)||0), 0);
  document.getElementById('daily-summary').textContent =
    `Today — ${Math.round(cal)} kcal · ${Math.round(prot)}g protein · ${todayN.length} items`;
}

// --- Parse Claude output ---
function parseBlocks(text) {
  const nutrition=[], wellbeing=[];
  const nr = /<nutrition>([\s\S]*?)<\/nutrition>/g;
  const wr = /<wellbeing>([\s\S]*?)<\/wellbeing>/g;
  let m;
  while ((m=nr.exec(text))!==null) { try { nutrition.push(JSON.parse(m[1].trim())); } catch(e){} }
  while ((m=wr.exec(text))!==null) { try { wellbeing.push(JSON.parse(m[1].trim())); } catch(e){} }
  return { nutrition, wellbeing };
}
function cleanText(text) {
  return text.replace(/<nutrition>[\s\S]*?<\/nutrition>/g,'').replace(/<wellbeing>[\s\S]*?<\/wellbeing>/g,'').trim();
}
function dbContext() {
  const n = entries.nutrition.slice(-50);
  const w = entries.wellbeing.slice(-20);
  if (!n.length && !w.length) return '';
  return `\n\nDatabase — Nutrition (${n.length}): ${JSON.stringify(n)}\nWellbeing (${w.length}): ${JSON.stringify(w)}`;
}

// --- Main send ---
async function sendMessage() {
  if (sending || !API_KEY) return;
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';

  sending = true;
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text + dbContext() });

  const { wrap, bubble } = addMsg('assistant', 'Searching…', true);

  try {
    let messages = [...history];
    let finalText = '';

    // Agentic loop — handles web_search tool use automatically
    for (let i = 0; i < 8; i++) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system: SYSTEM,
          tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 5 }],
          messages
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();
      const content = data.content || [];
      const textBlocks = content.filter(b => b.type === 'text').map(b => b.text).join('');
      const toolUses   = content.filter(b => b.type === 'tool_use');

      if (data.stop_reason === 'end_turn' || !toolUses.length) {
        finalText = textBlocks;
        break;
      }

      // Tool use round — add assistant response and tool results, loop again
      messages.push({ role: 'assistant', content });
      const toolResults = toolUses.map(tu => ({
        type: 'tool_result',
        tool_use_id: tu.id,
        content: 'Search executed.'
      }));
      messages.push({ role: 'user', content: toolResults });
    }

    const display = cleanText(finalText);
    bubble.textContent = display || 'Done!';
    wrap.classList.remove('thinking');
    history.push({ role: 'assistant', content: finalText });

    // Save structured data to sheet
    const { nutrition, wellbeing } = parseBlocks(finalText);
    let saved = 0;
    for (const e of nutrition) {
      entries.nutrition.push(e);
      try { await sheetPost({ action: 'write_nutrition', ...e }); saved++; } catch(e){}
    }
    for (const e of wellbeing) {
      entries.wellbeing.push(e);
      try { await sheetPost({ action: 'write_wellbeing', ...e }); saved++; } catch(e){}
    }
    if (saved > 0) {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.textContent = `${saved} entr${saved===1?'y':'ies'} saved to Google Sheets`;
      wrap.appendChild(tag);
      setStatus(`✦ Saved ${saved} entries`, 'ok');
      updateSummary();
    }

  } catch(e) {
    bubble.textContent = `Error: ${e.message}`;
    wrap.classList.remove('thinking');
    setStatus('Error', 'err');
  }

  sending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

// --- Render Log ---
function renderLog() {
  const panel = document.getElementById('log-panel');
  panel.innerHTML = '';
  const all = [
    ...entries.nutrition.map(e=>({...e,_type:'nutrition'})),
    ...entries.wellbeing.map(e=>({...e,_type:'wellbeing'}))
  ].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  if (!all.length) {
    panel.innerHTML='<div class="empty-state"><span class="icon">✦</span>No entries yet.<br>Start chatting to log your day.</div>';
    return;
  }
  let lastDate='';
  all.forEach(e => {
    if (e.date!==lastDate) {
      const h=document.createElement('div');
      h.className='log-date-header';
      h.textContent = e.date===TODAY?'Today':(e.date||'Unknown');
      panel.appendChild(h);
      lastDate=e.date;
    }
    const card=document.createElement('div');
    card.className='entry';
    const hdr=document.createElement('div');
    hdr.className='entry-header';
    hdr.innerHTML=`<div class="entry-date">${e.time||e._type}</div><div class="entry-type ${e._type}">${e._type}</div>`;
    card.appendChild(hdr);
    const pills=document.createElement('div');
    pills.className='entry-pills';
    if (e._type==='nutrition') {
      if(e.food)      pills.innerHTML+=`<span class="pill food">${e.food}${e.quantity&&e.quantity!=='1'?' ×'+e.quantity:''}</span>`;
      if(e.calories)  pills.innerHTML+=`<span class="pill cal">${e.calories} kcal</span>`;
      if(e.protein_g) pills.innerHTML+=`<span class="pill macro">P ${e.protein_g}g</span>`;
      if(e.carbs_g)   pills.innerHTML+=`<span class="pill macro">C ${e.carbs_g}g</span>`;
      if(e.fat_g)     pills.innerHTML+=`<span class="pill macro">F ${e.fat_g}g</span>`;
      if(e.notes)     pills.innerHTML+=`<span class="pill note">${e.notes}</span>`;
    } else {
      if(e.mood)      pills.innerHTML+=`<span class="pill mood">Mood ${e.mood}/10</span>`;
      if(e.energy)    pills.innerHTML+=`<span class="pill energy">Energy ${e.energy}/10</span>`;
      if(e.stress)    pills.innerHTML+=`<span class="pill stress">Stress ${e.stress}/10</span>`;
      if(e.sleep_hrs) pills.innerHTML+=`<span class="pill sleep">Sleep ${e.sleep_hrs}h</span>`;
      if(e.activity)  pills.innerHTML+=`<span class="pill macro">${e.activity}</span>`;
      if(e.note)      pills.innerHTML+=`<span class="pill note">${e.note}</span>`;
    }
    card.appendChild(pills);
    panel.appendChild(card);
  });
}

// --- Render Stats ---
function renderStats() {
  const panel = document.getElementById('stats-panel');
  panel.innerHTML = '';
  const n = entries.nutrition, w = entries.wellbeing;
  if (!n.length && !w.length) {
    panel.innerHTML='<div class="empty-state"><span class="icon">✦</span>Log some data first<br>and stats will appear here.</div>';
    return;
  }
  const todayN = n.filter(e=>e.date===TODAY);
  const cal  = todayN.reduce((s,e)=>s+(parseFloat(e.calories)||0),0);
  const prot = todayN.reduce((s,e)=>s+(parseFloat(e.protein_g)||0),0);
  const carb = todayN.reduce((s,e)=>s+(parseFloat(e.carbs_g)||0),0);
  const fat  = todayN.reduce((s,e)=>s+(parseFloat(e.fat_g)||0),0);
  if (todayN.length) {
    const c=document.createElement('div'); c.className='stat-card';
    c.innerHTML=`<div class="stat-label">Today's calories</div>
      <div class="stat-value">${Math.round(cal)}<span>kcal</span></div>
      <div class="stat-sub">${todayN.length} food entries</div>
      <div class="bar-wrap"><div class="bar-label"><span>Protein</span><span>${Math.round(prot)}g</span></div><div class="bar-track"><div class="bar-fill green" style="width:${Math.min(100,(prot/150)*100)}%"></div></div></div>
      <div class="bar-wrap"><div class="bar-label"><span>Carbs</span><span>${Math.round(carb)}g</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(carb/250)*100)}%"></div></div></div>
      <div class="bar-wrap"><div class="bar-label"><span>Fat</span><span>${Math.round(fat)}g</span></div><div class="bar-track"><div class="bar-fill blue" style="width:${Math.min(100,(fat/80)*100)}%"></div></div></div>`;
    panel.appendChild(c);
  }
  const last7w = w.slice(-7);
  if (last7w.length) {
    const moodArr  = last7w.filter(e=>e.mood);
    const sleepArr = last7w.filter(e=>e.sleep_hrs);
    const row=document.createElement('div'); row.className='stat-row';
    if (moodArr.length) {
      const avg=(moodArr.reduce((s,e)=>s+(parseFloat(e.mood)||0),0)/moodArr.length).toFixed(1);
      row.innerHTML+=`<div class="stat-card"><div class="stat-label">Avg mood (7d)</div><div class="stat-value">${avg}<span>/10</span></div><div class="stat-sub">${moodArr.length} entries</div></div>`;
    }
    if (sleepArr.length) {
      const avg=(sleepArr.reduce((s,e)=>s+(parseFloat(e.sleep_hrs)||0),0)/sleepArr.length).toFixed(1);
      row.innerHTML+=`<div class="stat-card"><div class="stat-label">Avg sleep (7d)</div><div class="stat-value">${avg}<span>hrs</span></div><div class="stat-sub">${sleepArr.length} entries</div></div>`;
    }
    if (row.innerHTML) panel.appendChild(row);
  }
  if (n.length) {
    const allCal=n.reduce((s,e)=>s+(parseFloat(e.calories)||0),0);
    const c=document.createElement('div'); c.className='stat-card';
    c.innerHTML=`<div class="stat-label">All time</div><div class="stat-value">${n.length}<span>food entries</span></div><div class="stat-sub">${Math.round(allCal).toLocaleString()} total kcal logged</div>`;
    panel.appendChild(c);
  }
}

// --- Init ---
function init() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-NZ', { weekday:'long', day:'numeric', month:'long' });
  loadData();
  if (!document.getElementById('messages').children.length) {
    addMsg('assistant', "Hi! Tell me what you've eaten or how you're feeling — I'll look up the nutrition info and save everything to your Google Sheet.");
  }
}

// Startup
const saved = localStorage.getItem('wb_api_key');
if (saved && saved.startsWith('sk-')) {
  API_KEY = saved;
  document.getElementById('api-screen').classList.add('hidden');
  init();
}
</script>
